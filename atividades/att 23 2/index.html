<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Verificador de Ano Bissexto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #43cea2, #185a9d);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .container {
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    input {
      color: #333;
    }

    button {
      background-color: #00c853;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #00a844;
    }

    .resultado {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Ano Bissexto</h2>

  <input type="number" id="ano" placeholder="Digite um ano">

  <button onclick="verificarBissexto()">Verificar</button>

  <div class="resultado" id="resultado"></div>
</div>

<script>
  function verificarBissexto() {
    let ano = parseInt(document.getElementById("ano").value);

    if (isNaN(ano)) {
      document.getElementById("resultado").innerText = "Digite um ano válido!";
      return;
    }

    let bissexto = (ano % 4 === 0 && ano % 100 !== 0) || (ano % 400 === 0);

    if (bissexto) {
      document.getElementById("resultado").innerText = ano + " é um ano bissexto.";
    } else {
      document.getElementById("resultado").innerText = ano + " NÃO é um ano bissexto.";
    }
  }
</script>

</body>
</html>

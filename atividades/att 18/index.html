<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conversor de Temperatura</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 300px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background-color: #4facfe;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #007bff;
    }

    .resultado {
      margin-top: 15px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Conversor de Temperatura</h2>

  <input type="number" id="valor" placeholder="Digite a temperatura">

  <select id="de">
    <option value="c">Celsius</option>
    <option value="f">Fahrenheit</option>
    <option value="k">Kelvin</option>
  </select>

  <select id="para">
    <option value="c">Celsius</option>
    <option value="f">Fahrenheit</option>
    <option value="k">Kelvin</option>
  </select>

  <button onclick="converter()">Converter</button>

  <div class="resultado" id="resultado"></div>
</div>

<script>
  function converter() {
    let valor = parseFloat(document.getElementById("valor").value);
    let de = document.getElementById("de").value;
    let para = document.getElementById("para").value;
    let resultado;

    if (isNaN(valor)) {
      document.getElementById("resultado").innerText = "Digite um valor válido!";
      return;
    }

    // Converter para Celsius primeiro
    let celsius;
    if (de === "c") {
      celsius = valor;
    } else if (de === "f") {
      celsius = (valor - 32) * 5/9;
    } else if (de === "k") {
      celsius = valor - 273.15;
    }

    // Converter de Celsius para destino
    if (para === "c") {
      resultado = celsius;
    } else if (para === "f") {
      resultado = (celsius * 9/5) + 32;
    } else if (para === "k") {
      resultado = celsius + 273.15;
    }

    document.getElementById("resultado").innerText =
      "Resultado: " + resultado.toFixed(2) + "°";
  }
</script>

</body>
</html>
